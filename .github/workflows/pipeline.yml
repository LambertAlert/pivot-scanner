# .github/workflows/pipeline.yml — Pivot Scanner War Room v2
#
# FIXES over v1:
#   - Comma crons split into individual entries (GitHub expands 1,31 internally
#     so github.event.schedule never matched the original string)
#   - macro_theme moved to 22:15 UTC (45min after daily — no race condition)
#   - fredapi added to daily pip install
#   - continue-on-error on slow prep scripts
#   - git remote set-url with GH_PAT for reliable push
#
# SECRETS REQUIRED:  GH_PAT  |  FRED_API_KEY  |  POLYGON_API_KEY (optional)

name: Pivot Scanner Pipelines

on:
  schedule:
    - cron: '0 5 * * 1'       # weekly — Mon 05:00 UTC (Sun 11pm CDT)
    - cron: '30 21 * * 1-5'   # daily  — M-F 21:30 UTC (4:30pm CDT)
    - cron: '15 22 * * 1-5'   # macro  — M-F 22:15 UTC (5:15pm CDT)
    # Intraday — individual crons (no comma expansion)
    - cron: '1 14 * * 1-5'
    - cron: '31 14 * * 1-5'
    - cron: '1 15 * * 1-5'
    - cron: '31 15 * * 1-5'
    - cron: '1 16 * * 1-5'
    - cron: '31 16 * * 1-5'
    - cron: '1 17 * * 1-5'
    - cron: '31 17 * * 1-5'
    - cron: '1 18 * * 1-5'
    - cron: '31 18 * * 1-5'
    - cron: '1 19 * * 1-5'
    - cron: '31 19 * * 1-5'
    - cron: '1 20 * * 1-5'
    - cron: '31 20 * * 1-5'
    - cron: '1 21 * * 1-5'
    - cron: '31 21 * * 1-5'

  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job to run'
        required: true
        default: 'daily'
        type: choice
        options: [weekly, daily, macro_theme, intraday]


jobs:

  # ── WEEKLY SCREENER ────────────────────────────────────────────────────────
  weekly_screener:
    name: Weekly Screen
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'weekly')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --quiet yfinance pandas numpy pyarrow
      - name: Run weekly screener
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python weekly_screener.py
      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git pull --rebase origin main || true
          git add data/ pivot_data.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "[ci skip] data update [weekly]"
          git push origin main


  # ── DAILY SCREENER ─────────────────────────────────────────────────────────
  daily_screener:
    name: Daily Screen
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 21 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'daily')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --quiet yfinance pandas numpy pyarrow fredapi polygon-api-client
      - name: daily_screener
        run: python daily_screener.py
      - name: radar_prep
        run: python radar_prep.py
      - name: volume_surge_prep
        run: python volume_surge_prep.py
      - name: tactical_macro_prep
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python tactical_macro_prep.py
      - name: speculative_theme_prep
        continue-on-error: true
        run: python speculative_theme_prep.py
      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git pull --rebase origin main || true
          git add data/ pivot_data.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "[ci skip] data update [daily]"
          git push origin main


  # ── MACRO + THEME ──────────────────────────────────────────────────────────
  macro_theme:
    name: Macro + Theme
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '15 22 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'macro_theme')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --quiet yfinance pandas numpy pyarrow fredapi polygon-api-client
      - name: macro_prep
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python macro_prep.py
      - name: theme_prep
        continue-on-error: true
        run: python theme_prep.py
      - name: index_read_prep
        continue-on-error: true
        run: python index_read_prep.py
      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git pull --rebase origin main || true
          git add data/ pivot_data.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "[ci skip] data update [macro_theme]"
          git push origin main


  # ── INTRADAY SCAN ──────────────────────────────────────────────────────────
  intraday_scan:
    name: Intraday Scan
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && (
        github.event.schedule == '1 14 * * 1-5'  || github.event.schedule == '31 14 * * 1-5' ||
        github.event.schedule == '1 15 * * 1-5'  || github.event.schedule == '31 15 * * 1-5' ||
        github.event.schedule == '1 16 * * 1-5'  || github.event.schedule == '31 16 * * 1-5' ||
        github.event.schedule == '1 17 * * 1-5'  || github.event.schedule == '31 17 * * 1-5' ||
        github.event.schedule == '1 18 * * 1-5'  || github.event.schedule == '31 18 * * 1-5' ||
        github.event.schedule == '1 19 * * 1-5'  || github.event.schedule == '31 19 * * 1-5' ||
        github.event.schedule == '1 20 * * 1-5'  || github.event.schedule == '31 20 * * 1-5' ||
        github.event.schedule == '1 21 * * 1-5'  || github.event.schedule == '31 21 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'intraday')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install --quiet yfinance pandas numpy pyarrow
      - name: pivot_scanner
        continue-on-error: true
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python pivot_scanner.py
      - name: radar_prep
        continue-on-error: true
        run: python radar_prep.py
      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git pull --rebase origin main || true
          git add data/ pivot_data.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "[ci skip] data update [intraday]"
          git push origin main
