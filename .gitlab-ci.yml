# .gitlab-ci.yml
# 30-Min Pivot Scanner — GitLab CI/CD Scheduler
# ================================================
# This file tells GitLab how to run your pivot scanner.
# The actual schedule (every :01 and :31) is set in the
# GitLab UI under Build → Schedules (see setup steps below).

image: python:3.11-slim

stages:
  - scan

run_pivot_scanner:
  stage: scan

  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

  before_script:
    - pip install polygon-api-client yfinance pandas numpy
    - echo "GMAIL_SENDER is $GMAIL_SENDER"
    - echo "GMAIL_RECIPIENT is $GMAIL_RECIPIENT"
    - echo "GMAIL_APP_PASS length is ${#GMAIL_APP_PASS}"

  script:
    - python pivot_scanner.py

  variables:
    GMAIL_SENDER:    $GMAIL_SENDER
    GMAIL_APP_PASS:  $GMAIL_PASS
    GMAIL_RECIPIENT: $GMAIL_RECIPIENT
    POLYGON_API_KEY: $POLYGON_API_KEY